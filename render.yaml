services:
  - type: web
    name: inventory-management-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SEED_DATA
        value: true
      - key: CORS_ORIGINS
        sync: false
